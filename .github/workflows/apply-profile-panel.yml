+  border-radius: 8px;
+  background: #eef7e8;
+  color: #315c43;
+}
+
+.profile-empty span {
+  margin-top: 4px;
+  color: #637269;
+  line-height: 1.5;
+}
+
 .progress-panel {
   margin-bottom: 18px;
 }

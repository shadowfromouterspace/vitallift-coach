+.profile-panel {
+  margin-bottom: 18px;
+}
+
+.profile-summary {
+  min-height: 76px;
+  display: flex;
+  align-items: center;
+  gap: 14px;
+  padding: 14px;
+  margin-bottom: 16px;
+  border-radius: 8px;
+  background: linear-gradient(135deg, #20352b, #315c43);
+  color: #f8fff8;
+}
+
+.profile-avatar {
+  width: 48px;
+  height: 48px;
+  display: grid;
+  place-items: center;
+  border-radius: 50%;
+  background: rgba(255, 255, 255, 0.14);
+  color: #d9f2df;
+  flex: 0 0 auto;
+}
+
+.profile-summary strong,
+.profile-summary span {
+  display: block;
+}
+
+.profile-summary span {
+  margin-top: 5px;
+  color: #c8e4ce;
+  line-height: 1.4;
+}
+
+.profile-form {
+  display: grid;
+  grid-template-columns: repeat(4, minmax(0, 1fr)) auto;
+  gap: 12px;
+  align-items: end;
+}
+
+.profile-location {
+  grid-column: span 2;
+}
+
+.profile-form button {
+  min-height: 44px;
+  display: inline-flex;
+  align-items: center;
+  justify-content: center;
+  gap: 9px;
+  padding: 0 16px;
+  border-radius: 8px;
+  background: #1f6f45;
+  color: #f8fff8;
+  font-weight: 760;
+  box-shadow: 0 16px 30px rgba(31, 111, 69, 0.14);
+}

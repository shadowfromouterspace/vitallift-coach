+  padding: 14px;
+  border-radius: 8px;
+  background: #fbfcf7;
+  border: 1px solid rgba(33, 50, 40, 0.09);
+}
+
+.profile-facts svg {
+  color: #2d7a4c;
+  flex: 0 0 auto;
+}
+
+.profile-facts span,

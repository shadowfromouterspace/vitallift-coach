AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Serverless backend for VitalLift Coach.

Globals:
  Function:
    Runtime: nodejs22.x
    Timeout: 10
    MemorySize: 256
    Architectures:
      - arm64

Resources:
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: vitallift-users
      AutoVerifiedAttributes:
        - email
      UsernameAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
          RequireUppercase: true
      Schema:
        - Name: email
          Required: true
          Mutable: true

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: vitallift-web
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      PreventUserExistenceErrors: ENABLED
      SupportedIdentityProviders:
        - COGNITO

  NutritionTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: entryId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: entryId
          KeyType: RANGE

  VitalLiftApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowMethods:
          - GET
          - POST
          - OPTIONS
        AllowHeaders:
          - content-type
          - authorization

  CoachFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../backend/lambda
      Handler: index.handler
      Environment:
        Variables:
          NUTRITION_TABLE: !Ref NutritionTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref NutritionTable
      Events:
        Health:
          Type: HttpApi
          Properties:
            ApiId: !Ref VitalLiftApi
            Path: /health
            Method: GET
        CoachTip:
          Type: HttpApi
          Properties:
            ApiId: !Ref VitalLiftApi
            Path: /coach/tip
            Method: GET

Outputs:
  CognitoUserPoolId:
    Description: Cognito User Pool ID for Vite auth config
    Value: !Ref UserPool
  CognitoUserPoolClientId:
    Description: Cognito User Pool app client ID for Vite auth config
    Value: !Ref UserPoolClient
  ApiUrl:
    Description: HTTP API endpoint
    Value: !Sub "https://${VitalLiftApi}.execute-api.${AWS::Region}.amazonaws.com"
